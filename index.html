<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIMA的日语语法</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #e8e4db;
  --text: #1a1815;
  --muted: #7a7570;
  --accent: #c0392b;
  --accent-light: #f9eded;
  --code-bg: #f0ede6;
  --radius: 6px;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', 'Noto Sans JP', serif;
  font-size: 16px;
  line-height: 1.8;
}
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 2rem; height: 56px;
}
.nav-title { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
.lang-switcher { display: flex; gap: 4px; }
.lang-btn {
  padding: 4px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: none;
  font-size: 13px; cursor: pointer;
  color: var(--muted);
  font-family: inherit;
  transition: all 0.15s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.wrapper { max-width: 860px; margin: 0 auto; padding: 3rem 2rem 6rem; }
#loading {
  display: flex; align-items: center; justify-content: center;
  padding: 4rem; color: var(--muted); font-size: 14px; gap: 10px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#content h1 {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 600; line-height: 1.2;
  margin: 0 0 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 2px solid var(--border);
}
#content h2 {
  font-size: 20px; font-weight: 600;
  margin: 2.5rem 0 1rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}
#content h3 {
  font-size: 16px; font-weight: 600;
  color: var(--accent);
  margin: 1.8rem 0 0.75rem;
}
#content p { margin-bottom: 0.8rem; }
#content ul, #content ol { padding-left: 1.5rem; margin-bottom: 0.8rem; }
#content li { margin-bottom: 0.3rem; }
#content strong { font-weight: 600; }
#content blockquote {
  border-left: 3px solid var(--accent);
  padding: 0.5rem 1rem;
  margin: 1rem 0;
  color: var(--muted);
  font-style: italic;
  background: var(--accent-light);
  border-radius: 0 var(--radius) var(--radius) 0;
}
#content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
#content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  overflow-x: auto;
  margin: 0.75rem 0;
}
#content code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--code-bg);
  padding: 1px 5px;
  border-radius: 3px;
}
#content pre code { background: none; padding: 0; font-size: 13px; line-height: 1.7; }
#content table {
  width: 100%; border-collapse: collapse;
  font-size: 14px; margin: 1rem 0;
  display: block; overflow-x: auto;
}
#content th {
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 8px 12px; text-align: left;
  font-weight: 500; font-size: 13px;
  color: var(--muted); white-space: nowrap;
}
#content td { border: 1px solid var(--border); padding: 8px 12px; vertical-align: top; }
#content tr:nth-child(even) td { background: #faf8f4; }
#content a { color: var(--accent); text-decoration: none; }
#content a:hover { text-decoration: underline; }
footer {
  text-align: center; font-size: 13px;
  color: var(--muted); padding: 2rem;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<nav>
  <span class="nav-title">ZIMA — 日语语法</span>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="loadLang('zh', this)">中文</button>
    <button class="lang-btn" onclick="loadLang('ja', this)">日本語</button>
    <button class="lang-btn" onclick="loadLang('en', this)">English</button>
  </div>
</nav>

<div class="wrapper">
  <div id="loading"><div class="spinner"></div>加载中…</div>
  <div id="content" style="display:none"></div>
</div>

<footer>© ZIMA. All rights reserved. · <a href="https://github.com/meishuhan/japanese-teaching" style="color:var(--accent)">GitHub</a></footer>

<script>
const files = {
  zh: 'grammar-zh.md',
  ja: 'grammar-ja.md',
  en: 'grammar-en.md'
};

const cache = {};

async function loadLang(lang, btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.lang = lang === 'ja' ? 'ja' : lang === 'en' ? 'en' : 'zh';

  const loading = document.getElementById('loading');
  const content = document.getElementById('content');

  if (cache[lang]) {
    content.innerHTML = cache[lang];
    loading.style.display = 'none';
    content.style.display = 'block';
    window.scrollTo(0, 0);
    return;
  }

  loading.style.display = 'flex';
  content.style.display = 'none';

  try {
    const res = await fetch(files[lang]);
    if (!res.ok) throw new Error('fetch failed ' + res.status);
    const md = await res.text();
    const html = marked.parse(md);
    cache[lang] = html;
    content.innerHTML = html;
    loading.style.display = 'none';
    content.style.display = 'block';
    window.scrollTo(0, 0);
  } catch(e) {
    loading.innerHTML = '<span style="color:var(--accent)">加载失败：' + e.message + '</span>';
  }
}

loadLang('zh', document.querySelector('.lang-btn'));
</script>
</body>
</html>
